# Local Postgres + pgvector for development & testing — no Supabase/Neon account
# needed to try the RAG feature locally.
#
#   docker compose up -d           # start the database
#   # then set in server/.env:
#   #   DATABASE_URL=postgresql://postgres:postgres@localhost:5433/camera_rag
#   cd server && npm run db:migrate # create the schema
#   docker compose down            # stop (data persists in the named volume)
#   docker compose down -v         # stop AND wipe the data

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: camera_rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camera_rag
    # Host port defaults to 5433 (mapped to container 5432) to avoid clashing
    # with any Postgres already on the default 5432. If 5433 is also taken,
    # override it:  DB_PORT=5434 docker compose up -d
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d camera_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
