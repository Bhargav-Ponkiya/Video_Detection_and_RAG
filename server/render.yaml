# Render Blueprint for the Document RAG API.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: camera-rag-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      # Secrets and per-deploy values: set in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
